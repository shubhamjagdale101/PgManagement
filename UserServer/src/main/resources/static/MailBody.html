<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Email</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 50px auto;
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.1);
            padding: 40px;
        }

        h2 {
            text-align: center;
            color: #333333;
            margin-bottom: 20px;
            text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.1);
        }

        .otp-box {
            text-align: center;
            margin-top: 20px;
        }

        .otp {
            display: inline-block;
            padding: 15px 30px;
            background-color: #ff6b6b;
            color: #ffffff;
            font-size: 28px;
            border-radius: 5px;
            box-shadow: 0px 4px 10px rgba(255, 107, 107, 0.3);
            text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease-in-out;
        }

        .otp:hover {
            transform: translateY(-3px);
            box-shadow: 0px 6px 15px rgba(255, 107, 107, 0.5);
        }

        .info-text {
            text-align: center;
            font-size: 16px;
            color: #666666;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>OTP Verification</h2>
    <div class="otp-box">
        <span class="otp">[OTP_PLACEHOLDER]</span>
    </div>
    <p class="info-text">This OTP is valid for a single use and should not be shared with anyone.</p>
    <p class="info-text">If you did not request this OTP, please ignore this email.</p>
</div>
</body>
</html>
